<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LunaBoard</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="dashboard">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <h1>🌙 LunaBoard</h1>
            <button id="theme-toggle">

                🌑 Dark Mode

            </button>

            <ul>

                <li>🏠 Inicio</li>
                <li>✅ Tareas</li>
                <li>🌙 Hábitos</li>
                <li>📝 Notas</li>

            </ul>

        </aside>

        <!-- CONTENIDO PRINCIPAL -->

        <main class="main-content">

            <!-- HERO -->

            <section class="hero">

                <h2>Buenas tardes, Marta ✨</h2>

                <p>
                    Organiza tu energía y tus objetivos.
                </p>

                <p id="magic-quote">

                    ✨ Todo llega a su tiempo.

                </p>

            </section>

            <!-- ESTADÍSTICAS -->

            <section class="stats">

                <div class="stat-card">

                    <h3>📋 Tareas</h3>

                    <p id="task-counter">0 pendientes</p>

                </div>

                <div class="stat-card">

                    <h3>🔥 Racha</h3>

                    <p>7 días</p>

                </div>

                <div class="stat-card">

                    <h3>🌙 Mood</h3>

                    <p id="mood-text">

                        Creativa ✨

                    </p>

                    <div class="mood-buttons">

                        <button class="mood-btn">
                            😊
                        </button>

                        <button class="mood-btn">
                            😴
                        </button>

                        <button class="mood-btn">
                            🔥
                        </button>

                        <button class="mood-btn">
                            🌙
                        </button>

                        <button class="mood-btn">
                            😵
                        </button>

                    </div>

                    <p>Creativa</p>

                </div>

            </section>

            <!-- FORMULARIO -->

            <section class="task-form">

                <input type="text" id="task-input" placeholder="¿Qué quieres hacer hoy?">
                <select id="category-select">

                    <option value="🌙 Personal">
                        🌙 Personal
                    </option>

                    <option value="📚 Estudio">
                        📚 Estudio
                    </option>

                    <option value="💻 Trabajo">
                        💻 Trabajo
                    </option>

                    <option value="🔥 Gym">
                        🔥 Gym
                    </option>

                </select>

                <button id="add-task">

                    Añadir tarea

                </button>

            </section>

            <!-- FILTROS -->

            <section class="filters">

                <button class="filter-btn active" data-filter="all">

                    ✨ Todas

                </button>

                <button class="filter-btn" data-filter="pending">

                    🌙 Pendientes

                </button>

                <button class="filter-btn" data-filter="completed">

                    ✅ Completadas

                </button>

            </section>

            <!-- LISTA DE TAREAS -->

            <section class="task-list" id="task-list">

                <!--
                    Las tareas aparecerán aquí
                    automáticamente con JavaScript
                -->

            </section>

        </main>

    </div>

    <!-- JAVASCRIPT -->

    <script src="js/app.js"></script>

</body>

</html>
